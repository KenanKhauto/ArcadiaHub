{% extends "base.html" %}

{% block title %}الملف{% endblock %}

{% block content %}
<div class="card glow-border">
    <h1 style="color:var(--primary); text-shadow: var(--glow);">الملف الشخصي</h1>
    <p style="color:#aaa;">احفظ اسمك ليظهر تلقائياً عند الدخول إلى الألعاب.</p>

    <input type="text" id="savedNameInput" placeholder="اكتب اسمك هنا..." />
    <button class="btn btn-primary" onclick="saveProfileName()">حفظ الاسم</button>
    <button class="btn" onclick="clearProfileName()">حذف الاسم المحفوظ</button>

    <div id="profileMessage" style="margin-top:15px; color:#aaa;"></div>
</div>

<script>
function loadProfileName() {
    const savedName = localStorage.getItem("undercover_player_name") || "";
    const input = document.getElementById("savedNameInput");
    const message = document.getElementById("profileMessage");

    input.value = savedName;

    if (savedName) {
        message.textContent = `الاسم المحفوظ حالياً: ${savedName}`;
    } else {
        message.textContent = "لا يوجد اسم محفوظ حالياً.";
    }
}

function saveProfileName() {
    const input = document.getElementById("savedNameInput");
    const message = document.getElementById("profileMessage");
    const name = input.value.trim();

    if (!name) {
        message.textContent = "الرجاء إدخال اسم صالح.";
        return;
    }

    localStorage.setItem("undercover_player_name", name);
    message.textContent = `تم حفظ الاسم: ${name}`;
}

function clearProfileName() {
    localStorage.removeItem("undercover_player_name");
    document.getElementById("savedNameInput").value = "";
    document.getElementById("profileMessage").textContent = "تم حذف الاسم المحفوظ.";
}

document.addEventListener("DOMContentLoaded", loadProfileName);
</script>
{% endblock %}
